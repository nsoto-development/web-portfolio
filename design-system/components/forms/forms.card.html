<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 20px; background: var(--bg-canvas); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { Input, Textarea, Select, Checkbox } = window.NsotoDevDesignSystem_0e0c82;

function Demo() {
  const [checked, setChecked] = React.useState(true);
  return (
    <div className="grid">
      <Input label="Email" placeholder="you@domain.com" />
      <Input label="Name" error="This field is required" />
      <Select label="Project type" options={[{label:"Web app", value:"web"},{label:"Mobile", value:"mobile"},{label:"API / backend", value:"api"}]} />
      <div style={{display:'flex', flexDirection:'column', gap: 10, justifyContent:'flex-end'}}>
        <Checkbox label="Subscribe to updates" checked={checked} onChange={() => setChecked(!checked)} />
        <Checkbox label="Disabled option" disabled />
      </div>
      <div style={{gridColumn: '1 / -1'}}>
        <Textarea label="Message" rows={4} placeholder="Tell me about your project..." />
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
