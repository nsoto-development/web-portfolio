<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 20px; background: var(--bg-canvas); }
  .row { display: flex; gap: 24px; align-items: flex-start; flex-wrap: wrap; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { Tooltip, Dialog, Toast, Button } = window.NsotoDevDesignSystem_0e0c82;

function Demo() {
  const [open, setOpen] = React.useState(false);
  return (
    <div className="row">
      <Tooltip label="Copy to clipboard">
        <Button variant="secondary" size="sm">Hover me</Button>
      </Tooltip>
      <Button variant="secondary" size="sm" onClick={() => setOpen(true)}>Open dialog</Button>
      <Toast tone="success" title="Message sent" message="I'll get back to you within 24h." onDismiss={() => {}} />
      <Toast tone="danger" title="Failed to send" />
      <Dialog open={open} onClose={() => setOpen(false)} title="Confirm send"
        footer={<><Button variant="ghost" size="sm" onClick={() => setOpen(false)}>Cancel</Button><Button variant="primary" size="sm" onClick={() => setOpen(false)}>Send</Button></>}>
        This will send a message from the contact form.
      </Dialog>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
