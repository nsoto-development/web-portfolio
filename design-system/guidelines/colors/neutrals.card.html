<!-- @dsCard group="Colors" viewport="700x180" name="Neutrals" subtitle="Dark-only surface scale — true black ground" -->
<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--bg-canvas); font-family: var(--font-mono); }
  .row { display: flex; gap: 8px; }
  .sw { flex: 1; height: 72px; border-radius: var(--radius-sm); display: flex; align-items: flex-end; padding: 8px; font-size: 10px; color: rgba(255,255,255,0.6); border: 1px solid var(--border-subtle); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background: var(--black)">black</div>
    <div class="sw" style="background: var(--gray-950)">950</div>
    <div class="sw" style="background: var(--gray-900)">900</div>
    <div class="sw" style="background: var(--gray-850)">850</div>
    <div class="sw" style="background: var(--gray-800)">800</div>
    <div class="sw" style="background: var(--gray-700)">700</div>
    <div class="sw" style="background: var(--gray-600)">600</div>
    <div class="sw" style="background: var(--gray-500)">500</div>
    <div class="sw" style="background: var(--gray-400); color:#000">400</div>
    <div class="sw" style="background: var(--gray-300); color:#000">300</div>
    <div class="sw" style="background: var(--gray-100); color:#000">100</div>
    <div class="sw" style="background: var(--white); color:#000">white</div>
  </div>
</body>
</html>
