<!-- @dsCard group="Colors" viewport="700x180" name="Brand Cyan Scale" subtitle="Primary accent — sampled from the cyan logo lockup" -->
<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--bg-canvas); font-family: var(--font-mono); }
  .row { display: flex; gap: 8px; }
  .sw { flex: 1; height: 72px; border-radius: var(--radius-sm); display: flex; align-items: flex-end; padding: 8px; font-size: 10px; color: rgba(255,255,255,0.7); border: 1px solid var(--border-subtle); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background: var(--cyan-900)">900</div>
    <div class="sw" style="background: var(--cyan-800)">800</div>
    <div class="sw" style="background: var(--cyan-700)">700</div>
    <div class="sw" style="background: var(--cyan-600)">600</div>
    <div class="sw" style="background: var(--cyan-500)">500</div>
    <div class="sw" style="background: var(--cyan-400); color:#00161a">400</div>
    <div class="sw" style="background: var(--cyan-300); color:#00161a">300</div>
    <div class="sw" style="background: var(--cyan-200); color:#00161a">200</div>
    <div class="sw" style="background: var(--cyan-100); color:#00161a">100</div>
  </div>
</body>
</html>
