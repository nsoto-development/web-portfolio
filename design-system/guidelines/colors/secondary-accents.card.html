<!-- @dsCard group="Colors" viewport="700x150" name="Secondary Accents" subtitle="Violet — rare gradient partner, from the primary lockup" -->
<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--bg-canvas); font-family: var(--font-mono); }
  .row { display: flex; gap: 8px; margin-bottom: 8px; }
  .sw { flex: 1; height: 48px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 11px; color: #fff; }
  .grad { flex: 1; height: 48px; border-radius: var(--radius-sm); background: var(--gradient-brand); display:flex; align-items:center; justify-content:center; font-size: 11px; color: #00161a; font-weight: 600; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background: var(--violet-500)">violet-500</div>
    <div class="sw" style="background: var(--violet-400); color:#00161a">violet-400</div>
  </div>
  <div class="row">
    <div class="grad">gradient-brand (cyan → blue, logo lockup)</div>
  </div>
</body>
</html>
