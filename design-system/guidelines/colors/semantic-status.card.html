<!-- @dsCard group="Colors" viewport="700x150" name="Semantic Status" subtitle="Success / warning / danger" -->
<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--bg-canvas); font-family: var(--font-mono); display: flex; gap: 12px; }
  .card { flex: 1; padding: 16px; border-radius: var(--radius-md); border: 1px solid; font-size: 12px; }
</style>
</head>
<body>
  <div class="card" style="background: rgba(34,197,94,0.1); border-color: rgba(34,197,94,0.3); color: var(--status-success)">--status-success</div>
  <div class="card" style="background: rgba(245,158,11,0.1); border-color: rgba(245,158,11,0.3); color: var(--status-warning)">--status-warning</div>
  <div class="card" style="background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.3); color: var(--status-danger)">--status-danger</div>
</body>
</html>
