<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 16px 20px; background: var(--bg-canvas); font-family: var(--font-mono); color: var(--text-secondary); }
  .row { display: flex; align-items: baseline; gap: 12px; margin-bottom: 4px; }
  .tok { width: 90px; font-size: 11px; color: var(--text-tertiary); }
</style>
</head>
<body>
  <div class="row"><span class="tok">2xl / 36</span><span style="font-size: var(--text-2xl); color: var(--text-primary)">Aa</span></div>
  <div class="row"><span class="tok">lg / 22</span><span style="font-size: var(--text-lg); color: var(--text-primary)">Aa</span></div>
  <div class="row"><span class="tok">base / 16</span><span style="font-size: var(--text-base); color: var(--text-primary)">Aa</span></div>
  <div class="row"><span class="tok">sm / 14</span><span style="font-size: var(--text-sm); color: var(--text-primary)">Aa</span></div>
  <div class="row"><span class="tok">xs / 12</span><span style="font-size: var(--text-xs); color: var(--text-primary)">Aa</span></div>
</body>
</html>
