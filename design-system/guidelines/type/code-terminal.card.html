<!-- @dsCard group="Type" viewport="700x200" name="Code / Terminal" subtitle="Mono at code size — inline & block" -->
<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--bg-canvas); font-family: var(--font-sans); color: var(--text-secondary); font-size: 14px; }
  code { font-family: var(--font-mono); background: var(--bg-inset); border: 1px solid var(--border-subtle); padding: 2px 6px; border-radius: var(--radius-xs); color: var(--brand); font-size: 0.9em; }
  pre { font-family: var(--font-mono); background: var(--bg-inset); border: 1px solid var(--border-default); border-radius: var(--radius-md); padding: 14px 16px; color: var(--text-secondary); font-size: 13px; margin: 10px 0 0; }
  .prompt { color: var(--brand); }
</style>
</head>
<body>
  Inline: run <code>npm run build</code> before deploy.
  <pre><span class="prompt">$</span> git clone https://github.com/nsoto/project
<span class="prompt">$</span> pnpm install &amp;&amp; pnpm dev<span style="color:var(--brand)">_</span></pre>
</body>
</html>
