<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--bg-canvas); }
  p { font-family: var(--font-sans); color: var(--text-secondary); line-height: var(--leading-normal); margin: 0 0 10px; }
</style>
</head>
<body>
  <p style="font-size: var(--text-md); color: var(--text-primary);">Solo developer building web apps end to end — design, frontend, backend, deploy.</p>
  <p style="font-size: var(--text-sm);">Body copy stays plain and direct. Short sentences. No fluff, no filler adjectives — describe what was built and what it does.</p>
  <p style="font-size: var(--text-xs); color: var(--text-tertiary);">Caption / metadata size — timestamps, tech-stack notes, fine print.</p>
</body>
</html>
