<!-- @dsCard group="Spacing" viewport="700x180" name="Radius Scale" subtitle="Small, precise — never pill-heavy" -->
<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--bg-canvas); display: flex; gap: 14px; }
  .box { width: 80px; height: 80px; background: var(--bg-surface-raised); border: 1px solid var(--border-default); display: flex; align-items: flex-end; justify-content: center; padding-bottom: 6px; font-family: var(--font-mono); font-size: 10px; color: var(--text-tertiary); }
</style>
</head>
<body>
  <div class="box" style="border-radius: var(--radius-xs)">xs 4</div>
  <div class="box" style="border-radius: var(--radius-sm)">sm 6</div>
  <div class="box" style="border-radius: var(--radius-md)">md 8</div>
  <div class="box" style="border-radius: var(--radius-lg)">lg 12</div>
  <div class="box" style="border-radius: var(--radius-xl)">xl 16</div>
  <div class="box" style="border-radius: var(--radius-full)">full</div>
</body>
</html>
