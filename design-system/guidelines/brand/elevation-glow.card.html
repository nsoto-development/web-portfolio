<!-- @dsCard group="Brand" viewport="700x200" name="Button Elevation & Glow" subtitle="Shadow tokens in use" -->
<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg-canvas); display: flex; gap: 20px; align-items: center; font-family: var(--font-mono); font-size: 12px; }
  .btn { padding: 12px 22px; border-radius: var(--radius-sm); background: var(--brand); color: var(--text-on-brand); box-shadow: var(--glow-brand-button); }
  .card { padding: 16px 20px; border-radius: var(--radius-lg); background: var(--bg-surface); border: 1px solid var(--border-default); box-shadow: var(--shadow-card); color: var(--text-secondary); }
</style>
</head>
<body>
  <div class="btn">glow-brand-button</div>
  <div class="card">shadow-card</div>
</body>
</html>
