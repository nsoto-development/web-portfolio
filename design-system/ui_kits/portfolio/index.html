<style>
  html, body { margin: 0; background: var(--bg-canvas); }
  ::-webkit-scrollbar { width: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--gray-700); border-radius: 8px; }

<body>
<div id="root"></div>

<script src="data.js"></script>
<script>
  async function loadPartials() {
    const files = ["icons.jsx", "Nav.jsx", "Hero.jsx", "Experience.jsx", "Skills.jsx", "About.jsx", "Contact.jsx", "Footer.jsx"];
    for (const file of files) {
      const res = await fetch(file);
      const src = await res.text();
      const code = Babel.transform(src, { presets: ["react"] }).code;
      (0, eval)(code);
    }

    ReactDOM.createRoot(document.getElementById("root")).render(
      React.createElement(function AppRoot() {
        return React.createElement(
          "div",
          null,
          React.createElement(window.Nav),
          React.createElement(window.Hero),
          React.createElement(window.Experience),
          React.createElement(window.Skills),
          React.createElement(window.About),
          React.createElement(window.Contact),
          React.createElement(window.Footer)
        );
      })
    );
  }
  loadPartials();
</script>
